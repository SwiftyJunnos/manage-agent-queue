<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title description">
  <title id="title">Manage Agent Queue</title>
  <desc id="description">An editorial operations board showing dependency-aware tasks moving through a shared queue with explicit claims and leases.</desc>

  <defs>
    <pattern id="queue-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#182235" stroke-opacity="0.075" stroke-width="1" />
    </pattern>
    <filter id="queue-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#182235" flood-opacity="0.14" />
    </filter>
    <clipPath id="board-clip">
      <rect x="806" y="84" width="294" height="246" rx="7" />
    </clipPath>
  </defs>

  <rect width="1200" height="520" rx="18" fill="#F4F0E8" />
  <rect width="1200" height="520" rx="18" fill="url(#queue-grid)" />

  <circle cx="1118" cy="48" r="194" fill="none" stroke="#2F6F68" stroke-opacity="0.14" stroke-width="48" />
  <circle cx="1118" cy="48" r="118" fill="none" stroke="#2F6F68" stroke-opacity="0.34" stroke-width="1" />
  <path d="M114 54v20M104 64h20M1128 360v20M1118 370h20" stroke="#D66853" stroke-width="2" />

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="72" y="58" width="268" height="28" fill="#182235" />
    <circle cx="88" cy="72" r="4" fill="#D66853" />
    <text x="101" y="76" fill="#F4F0E8" font-size="11" font-weight="700" letter-spacing="1.65">COORDINATE WITHOUT COLLISIONS</text>

    <text x="72" y="156" fill="#182235" font-family="Georgia, 'Times New Roman', serif" font-size="63" letter-spacing="-2.4">
      <tspan x="72">Make parallel work</tspan>
      <tspan x="72" dy="66">safely claimable.</tspan>
    </text>

    <text x="74" y="272" fill="#536071" font-size="17">
      <tspan x="74">Declare dependencies. Reserve exact resources.</tspan>
      <tspan x="74" dy="26">Recover stalled work without guesswork.</tspan>
    </text>

    <g filter="url(#queue-shadow)">
      <rect x="780" y="50" width="342" height="310" rx="10" fill="#FFFDF8" stroke="#182235" stroke-width="1.5" />
      <rect x="780" y="50" width="342" height="34" rx="10" fill="#182235" />
      <rect x="780" y="74" width="342" height="10" fill="#182235" />
      <circle cx="799" cy="67" r="4" fill="#D66853" />
      <circle cx="813" cy="67" r="4" fill="#D8D0C4" />
      <circle cx="827" cy="67" r="4" fill="#D8D0C4" />
      <text x="1095" y="70" text-anchor="end" fill="#C8D0DB" font-size="9" font-weight="700" letter-spacing="1.1">QUEUE STATUS</text>

      <g clip-path="url(#board-clip)">
        <text x="806" y="111" fill="#182235" font-size="15" font-weight="700">checkout-improvements</text>
        <text x="1074" y="111" text-anchor="end" fill="#2F6F68" font-size="10" font-weight="700">3 READY</text>

        <rect x="806" y="129" width="268" height="52" rx="6" fill="#E3EBE8" stroke="#A9BBB5" />
        <circle cx="824" cy="147" r="7" fill="#2F6F68" />
        <rect x="840" y="141" width="102" height="8" rx="4" fill="#496D68" />
        <rect x="840" y="157" width="148" height="6" rx="3" fill="#A9BBB5" />
        <rect x="1014" y="141" width="44" height="16" rx="8" fill="#2F6F68" />
        <text x="1036" y="152" text-anchor="middle" fill="#FFFDF8" font-size="8" font-weight="700">LEASED</text>

        <rect x="806" y="193" width="268" height="52" rx="6" fill="#F8EDE7" stroke="#DDB5A8" />
        <circle cx="824" cy="211" r="7" fill="#D66853" />
        <rect x="840" y="205" width="128" height="8" rx="4" fill="#8A5A4C" />
        <rect x="840" y="221" width="118" height="6" rx="3" fill="#DDB5A8" />
        <rect x="1014" y="205" width="44" height="16" rx="8" fill="#D66853" />
        <text x="1036" y="216" text-anchor="middle" fill="#FFFDF8" font-size="8" font-weight="700">BLOCKED</text>

        <rect x="806" y="257" width="268" height="52" rx="6" fill="#F4F0E8" stroke="#C9C1B5" />
        <circle cx="824" cy="275" r="7" fill="#C9C1B5" />
        <rect x="840" y="269" width="88" height="8" rx="4" fill="#7A746B" />
        <rect x="840" y="285" width="164" height="6" rx="3" fill="#C9C1B5" />
        <rect x="1014" y="269" width="44" height="16" rx="8" fill="#7A746B" />
        <text x="1036" y="280" text-anchor="middle" fill="#FFFDF8" font-size="8" font-weight="700">READY</text>
      </g>
    </g>

    <text x="793" y="390" fill="#2F6F68" font-size="10" font-weight="700" letter-spacing="1.4">ONE QUEUE · EXPLICIT OWNERSHIP</text>
    <path d="M780 376h342" stroke="#2F6F68" stroke-opacity="0.38" stroke-dasharray="4 5" />

    <g transform="translate(72 402)">
      <g>
        <rect width="190" height="70" fill="#E3EBE8" stroke="#A9BBB5" />
        <text x="14" y="24" fill="#2F6F68" font-size="10" font-weight="700" letter-spacing="1.2">01</text>
        <text x="14" y="48" fill="#182235" font-size="15" font-weight="700">DEFINE</text>
      </g>
      <g transform="translate(213 0)">
        <rect width="190" height="70" fill="#E3EBE8" stroke="#A9BBB5" />
        <text x="14" y="24" fill="#2F6F68" font-size="10" font-weight="700" letter-spacing="1.2">02</text>
        <text x="14" y="48" fill="#182235" font-size="15" font-weight="700">REGISTER</text>
      </g>
      <g transform="translate(426 0)">
        <rect width="190" height="70" fill="#E3EBE8" stroke="#A9BBB5" />
        <text x="14" y="24" fill="#2F6F68" font-size="10" font-weight="700" letter-spacing="1.2">03</text>
        <text x="14" y="48" fill="#182235" font-size="15" font-weight="700">CLAIM</text>
      </g>
      <g transform="translate(639 0)">
        <rect width="190" height="70" fill="#E3EBE8" stroke="#A9BBB5" />
        <text x="14" y="24" fill="#2F6F68" font-size="10" font-weight="700" letter-spacing="1.2">04</text>
        <text x="14" y="48" fill="#182235" font-size="15" font-weight="700">EXECUTE</text>
      </g>
      <g transform="translate(852 0)">
        <rect width="190" height="70" fill="#182235" stroke="#182235" />
        <text x="14" y="24" fill="#D66853" font-size="10" font-weight="700" letter-spacing="1.2">05</text>
        <text x="14" y="48" fill="#FFFDF8" font-size="15" font-weight="700">VERIFY</text>
      </g>
      <g fill="#D66853" font-size="18" font-weight="700">
        <text x="198" y="42">→</text>
        <text x="411" y="42">→</text>
        <text x="624" y="42">→</text>
        <text x="837" y="42">→</text>
      </g>
    </g>
  </g>
</svg>
